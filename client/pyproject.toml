[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
jumpstarter = { workspace = true }
jumpstarter-cli = { workspace = true }

[dependency-groups]
dev = [
    "ruff==0.9.2",
    "typos>=1.23.6",
    "pre-commit>=3.8.0",
]

all = [
    "jumpstarter-cli",
    "jumpstarter",
]

[tool.ruff]
target-version = "py311"
exclude = ["packages/jumpstarter-protocol"]
line-length = 120

[tool.ruff.lint]
exclude = ["packages/jumpstarter-protocol"]
extend-select = ["I", "C", "E", "F", "W", "B"]

[tool.ruff.lint.isort]
known-local-folder = ["packages", "jumpstarter"]

[tool.typos.default]
locale = "en-us"

[tool.typos.default.extend-words]
ser = "ser"
Pn = "Pn"
mosquitto = "mosquitto"

[tool.coverage.run]
omit = ["conftest.py", "test_*.py", "*_test.py", "*_pb2.py", "*_pb2_grpc.py"]

[tool.pytest.ini_options]
addopts = "--capture=no --doctest-modules --cov --cov-report=html --cov-report=xml"
