[project]
name = "jumpstarter-cli"
dynamic = ["version"]
description = "Jumpstarter CLI tools for device automation and testing"
authors = [
  { name = "Nick Cao", email = "ncao@redhat.com" },
  { name = "Miguel Angel Ajo Pelayo", email = "majopela@redhat.com" },
  { name = "Kirk Brauer", email = "kbrauer@hatci.com" },
]
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
  "click>=8.0.0",
  "truststore>=0.8.0",
]

[dependency-groups]
dev = [
  "pytest>=8.3.2",
  "pytest-anyio>=0.0.0",
  "pytest-asyncio>=0.0.0",
  "pytest-cov>=5.0.0",
]

[project.scripts]
jmp = "jumpstarter_cli.jmp:jmp"
j = "jumpstarter_cli.j:j"

[tool.hatch.build.targets.wheel]
packages = ["jumpstarter_cli"]

[project.urls]
Homepage = "https://jumpstarter.dev"
"Source Code" = "https://github.com/BizzmarkUG/jumpstarter-server"
Documentation = "https://jumpstarter.dev"

[tool.hatch.version]
path = "jumpstarter_cli/__init__.py"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"