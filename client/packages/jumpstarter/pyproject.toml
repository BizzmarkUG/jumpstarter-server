[project]
name = "jumpstarter"
dynamic = ["version"]
description = "Jumpstarter Python library for device automation and testing"
authors = [
  { name = "Nick Cao", email = "ncao@redhat.com" },
  { name = "Miguel Angel Ajo Pelayo", email = "majopela@redhat.com" },
  { name = "Kirk Brauer", email = "kbrauer@hatci.com" },
]
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
  "grpcio>=1.50.0",
  "protobuf>=4.0.0",
  "anyio>=3.0.0",
  "pydantic>=2.0.0",
  "PyYAML>=6.0.0",
]

[dependency-groups]
dev = [
  "pytest>=8.3.2",
  "pytest-anyio>=0.0.0",
  "pytest-asyncio>=0.0.0",
  "pytest-cov>=5.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["jumpstarter"]

[project.urls]
Homepage = "https://jumpstarter.dev"
"Source Code" = "https://github.com/BizzmarkUG/jumpstarter-server"
Documentation = "https://jumpstarter.dev"

[tool.hatch.version]
path = "jumpstarter/__init__.py"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
